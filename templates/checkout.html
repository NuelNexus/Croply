<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Slider</title>

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
</head>
<body>

<div class="card-container">

    <div class="shop-card">
      <div class="title">
        FRUIT
      </div>
      <div class="desc">
        Apple 
      </div>
      
      <div class="slider">
        <figure data-primary="#E24938" data-secondary="#A30F22">
          <img src="https://plus.unsplash.com/premium_photo-1724249990837-f6dfcb7f3eaa?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8QXBwbGVzfGVufDB8fDB8fHww" alt="Red Apple" />
        </figure>
        <figure data-primary="#6CD96A" data-secondary="#00986F">
          <img src="https://images.unsplash.com/photo-1577028300036-aa112c18d109?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NTB8fEFwcGxlc3xlbnwwfHwwfHx8MA%3D%3D" alt="Green Apple" />
        </figure>
        <figure data-primary="#4795D1" data-secondary="#006EB8">
          <img src="https://images.unsplash.com/photo-1731321967733-87167dba4415?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTM3fHxBcHBsZXN8ZW58MHx8MHx8fDA%3D" alt="Blue Apple" />
        </figure>
        <figure data-primary="#292a2f" data-secondary="#131519">
          <img src="https://plus.unsplash.com/premium_photo-1675964349731-e7710eaebf8f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NTZ8fEFwcGxlc3xlbnwwfHwwfHx8MA%3D%3D" alt="Dark Apple" />
        </figure>
      </div>

      <div class="cta">
        <div class="price">$130</div>
        <button class="btn">Check-Out<span class="bg"></span></button>
      </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<style>
    *, *::before, *::after {
        box-sizing: border-box;
    }
    body, html {
        height: 100%;
        font-family: 'Open Sans Condensed', sans-serif;
        margin: 0;
    }
    body {
        background: #2b2b2b; 
    }
    .card-container {
        display: flex;
        flex-wrap: wrap; 
        gap: 40px; 
        padding: 40px; 
        align-items: flex-start;
        justify-content: flex-start;
    }

    .shop-card {
        position: relative; 
        width: 350px;
        background: #f5f5f5;
        box-shadow: 0 10px 20px rgba(0, 0, 0, .3);
        overflow: hidden;
        border-radius: 5px;
        padding: 25px;
        text-align: center;
        z-index: 2;
    }
    .shop-card figure {
        margin: 0;
        padding: 0;
        overflow: hidden;
        outline: none !important;
    }
    .shop-card figure img {
        margin: -95px 0 -60px;
        width: 100%;
    }
    .shop-card .title {
        font-weight: 900;
        text-transform: uppercase;
        font-size: 30px;
        color: #23211f;
        margin-bottom: 5px;
    }
    .shop-card .desc {
        font-size: 17px;
        opacity: 0.8;
        margin-bottom: 3px;
    }
    .shop-card .cta {
        padding: 20px 20px 5px;
    }
    .shop-card .cta::after {
        content: '';
        display: table;
        clear: both;
    }
    .shop-card .price {
        float: left;
        color: #ff3100;
        font-size: 22px;
        font-weight: 900;
        padding-top: 2px;
        transition: color 0.3s ease-in-out;
        margin-top: 4px;
    }
    .shop-card .btn {
        position: relative;
        z-index: 1;
        float: right;
        display: inline-block;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
        color: #ff3100;
        padding: 12px 18px;
        cursor: pointer;
        transition: all 0.3s ease-in-out;
        line-height: 0.95;
        background: none;
        outline: none;
        border: 1px solid #ff3100;
        border-radius: 20px;
        overflow: hidden;
    }
    .shop-card .btn .bg {
        width: 101%;
        height: 101%;
        position: absolute;
        top: 0;
        left: 0;
        display: block !important;
        z-index: -1;
        opacity: 0;
        transition: all 0.3s ease-in-out;
        background: linear-gradient(135deg, #a61322, #d33f34);
    }
    .shop-card .btn:hover {
        color: #fff !important;
        border: 1px solid transparent !important;
    }
    .shop-card .btn:hover .bg {
        opacity: 1;
    }
    
    .slick-dots {
        bottom: -30px;
    }
    .slick-dots li button:before {
        font-size: 12px;
        color: #000;
        opacity: 0.2;
    }
    .slick-dots li.slick-active button:before {
        opacity: 0.8;
    }
</style>

<script>
    $(function () {
        $(".slider").each(function() {
            const slider = $(this);
            const parentCard = slider.closest('.shop-card');

            slider.slick({
                arrows: false,
                dots: true,
                fade: true,
                speed: 600
            });

            slider.on(
                "afterChange",
                function(event, slick, currentSlide) {
                    const slide = $(slick.$slides[currentSlide]);
                    const primary = slide.data("primary");
                    const secondary = slide.data("secondary");

                    // Updates only the elements within THIS specific card
                    parentCard.find(".price").css("color", primary);

                    parentCard.find(".btn").css({
                        "color": primary,
                        "border-color": primary
                    });

                    parentCard.find(".btn .bg").css(
                        "background",
                        `linear-gradient(135deg, ${secondary}, ${primary})`
                    );
                }
            );
            slider.trigger("afterChange", [slider.slick('getSlick'), 0]);
        });
    });
</script>
</body>
</html>
