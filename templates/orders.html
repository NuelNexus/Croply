<style>
* { margin: 0px; padding: 0px; box-sizing: border-box; }
body {
    background: #eaebec;
    font-family: "Open Sans", sans-serif; 
}

/* Flex Container for Cards */
.card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    padding: 40px;
    align-items: flex-start;
    justify-content: flex-start; /* Pushes to top left */
}

.view-code {
    display: inline-block;
    color: #48cfad; 
    font-size: 14px;
    text-transform: uppercase;
    font-weight: 700;
    text-decoration: none;
    margin: 20px 0 0 40px;
}
.view-code:hover { color: #34c29e; }

/* --- Product Card ---- */
.make-3D-space {
    position: relative; /* Changed from absolute centering */
    perspective: 800px;
    width: 340px;
    height: 500px;
    transform-style: preserve-3d;
    transition: transform 5s;
}

.product-front, .product-back {
    width: 335px;
    height: 500px;
    background: #fff;
    position: absolute;
    left: -5px;
    top: -5px;
    transition: all 100ms ease-out; 
}
.product-back {
    display: none;
    transform: rotateY( 180deg );
}
.product-card.animate .product-back, .product-card.animate .product-front {
    top: 0px;
    left: 0px;
    transition: all 100ms ease-out; 
}
.product-card {
    width: 325px;
    height: 490px;
    position: absolute;    
    top: 10px;
    left: 10px;  
    overflow: hidden;
    transform-style: preserve-3d;
    transition:  100ms ease-out;
}
div.product-card.flip-10 {
    transform: rotateY( -10deg );
    transition: 50ms ease-out;          
}
div.product-card.flip90 {
    transform: rotateY( 90deg );
    transition: 100ms ease-in;          
}
div.product-card.flip190 {
    transform: rotateY( 190deg );
    transition: 100ms ease-out;             
}
div.product-card.flip180 {
    transform: rotateY( 180deg );
    transition: 150ms ease-out;             
}
.product-card.animate {
    top: 5px;
    left: 5px;
    width: 335px;
    height: 500px;
    box-shadow: 0px 13px 21px -5px rgba(0, 0, 0, 0.3);
    transition: 100ms ease-out; 
}
.stats-container {
    background: #fff;    
    position: absolute;
    top: 386px;
    left: 0;
    width: 265px;
    height: 300px;
    padding: 27px 35px 35px; 
    transition: all 200ms ease-out;
}
.product-card.animate .stats-container {
    top: 272px;
    transition: all 200ms ease-out; 
}
.stats-container .product_name {
    font-size: 22px;
    color: #393c45;  
}
.stats-container p {
    font-size: 16px;
    color: #b1b1b3;  
    padding: 2px 0 20px 0;
}
.stats-container .product_price {
    float: right;
    color: #48cfad;
    font-size: 22px;
    font-weight: 600;
}
.image_overlay {
    position: absolute;
    top: 0;
    left: 0; 
    width: 100%;
    height: 100%;
    background: #48daa1;
    opacity: 0;  
}
.product-card.animate .image_overlay {
    opacity: 0.7;    
    transition: all 200ms ease-out; 
}
.product-options { padding: 2px 0 0; }
.product-options strong {
    font-weight: 700;
    color: #393c45;
    font-size: 14px;
}
.product-options span {  
    color: #969699;
    font-size: 14px;
    display: block;
    margin-bottom: 8px;
}
.view_details {  
    position: absolute;
    top: 112px;
    left: 50%;
    margin-left: -85px;  
    border: 2px solid #fff;
    color: #fff;
    font-size: 19px;
    text-align: center;
    text-transform: uppercase;
    font-weight: 700;
    padding: 10px 0;
    width: 172px;    
    opacity: 0;
    transition: all 200ms ease-out; 
}
.view_details:hover {    
    background: #fff;
    color: #48cfad;
    cursor: pointer;
}
.product-card.animate .view_details {
    opacity: 1;
    width: 152px;
    font-size: 15px;
    margin-left: -75px;
    top: 115px;
    transition: all 200ms ease-out;         
}
div.colors div {
    margin-top: 3px;
    width: 15px; 
    height: 15px;   
    margin-right: 5px;
    float: left;
}
div.colors div span {
    width: 15px; 
    height: 15px; 
    display: block;
    border-radius: 50%;
}
div.colors div span:hover {
    width: 17px;
    height: 17px;
    margin: -1px 0 0 -1px;
}
div.c-yellow span { background: #e2cd13; }
div.c-red span { background: #f56060; }
div.c-green span { background: #44c28d; }
div.c-white span {
    background: #fff;
    width: 14px;
    height: 14px; 
    border: 1px solid #e8e9eb;
}
div.shadow {
    width: 335px; height: 520px;
    opacity: 0;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 3;
    display: none;
    background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0.2)); 
}
.product-back div.shadow {
    z-index: 10;
    opacity: 1;
    background: linear-gradient(to right, rgba(0,0,0,0.2), rgba(0,0,0,0.1)); 
}
.flip-back {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 30px;
    height: 30px;
    cursor: pointer;
}
.cx, .cy {
    background: #d2d5dc;
    position: absolute;
    width: 0px;
    top: 15px;
    right: 15px;
    height: 3px;
    transition: all 250ms ease-in-out;
}
.flip-back:hover .cx, .flip-back:hover .cy {
    background: #979ca7;
}
.cx.s1, .cy.s1 { 
    right: 0;    
    width: 30px; 
    transition: all 100ms ease-out;
}
.cy.s2 { 
    transform: rotate(50deg);        
    transition: all 100ms ease-out;
}
.cy.s3 { 
    transform: rotate(45deg);        
    transition: all 100ms ease-out;
}
.cx.s1 { 
    right: 0;    
    width: 30px; 
    transition: all 100ms ease-out;
}
.cx.s2 { 
    transform: rotate(140deg);       
    transition: all 100ms ease-out;
}
.cx.s3 { 
    transform: rotate(135deg);       
    transition: all 100ms ease-out;
}
.carousel {
    width: 335px;
    height: 500px;
    overflow: hidden;
    position: relative;
}
.carousel ul {
    position: absolute;
    top: 0;
    left: 0;
}
.carousel li {
    width: 335px;
    height: 500px;
    float: left;
    overflow: hidden;   
}
.arrows-perspective {
    width: 335px;
    height: 55px;
    position: absolute;
    top: 218px;
    transform-style: preserve-3d;
    transition: transform 5s;
    perspective: 335px;
}
.carouselPrev, .carouselNext {
    width: 50px;
    height: 55px;
    background: #ccc;
    position: absolute; 
    top: 0;
    transition: all 200ms ease-out; 
    opacity: 0.9;
    cursor: pointer;
}
.carouselNext {
    top: 0;
    right: -26px;
    transform: rotateY( -117deg );
    transition: all 200ms ease-out;          
}
.carouselNext.visible {
    right: 0;
    opacity: 0.8;
    background: #efefef;
    transform: rotateY( 0deg );
    transition: all 200ms ease-out; 
}
.carouselPrev {     
    left: -26px;
    top: 0;
    transform: rotateY( 117deg );
    transition: all 200ms ease-out; 
}
.carouselPrev.visible {
    left: 0;
    opacity: 0.8;
    background: #eee;
    transform: rotateY( 0deg );
    transition: all 200ms ease-out; 
}
.carousel .x, .carousel .y {
    height: 2px;
    width: 15px;
    background: #48cfad;
    position: absolute;
    top: 31px;
    left: 17px;
    transform: rotate(45deg);   
}
.carousel .x {
    transform: rotate(135deg);      
    top: 21px;
}
.carousel .carouselNext .x {
    transform: rotate(45deg);       
}
.carousel .carouselNext .y {
    transform: rotate(135deg);      
}
</style>

<script>
$(document).ready(function(){
    
    // Lift card and show stats on Mouseover (Scoped)
    $('.product-card').hover(function(){
        $(this).addClass('animate');
        $(this).find('div.carouselNext, div.carouselPrev').addClass('visible');            
    }, function(){
        $(this).removeClass('animate');         
        $(this).find('div.carouselNext, div.carouselPrev').removeClass('visible');
    }); 
    
    // Flip card to the back side (Scoped)
    $('.view_details').click(function(){ 
        var pCard = $(this).closest('.product-card');
               
        pCard.find('div.carouselNext, div.carouselPrev').removeClass('visible');
        pCard.addClass('flip-10');
        setTimeout(function(){
            pCard.removeClass('flip-10').addClass('flip90').find('div.shadow').show().fadeTo( 80 , 1, function(){
                pCard.find('.product-front, .product-front div.shadow').hide();           
            });
        }, 50);
        
        setTimeout(function(){
            pCard.removeClass('flip90').addClass('flip190');
            pCard.find('.product-back').show().find('div.shadow').show().fadeTo( 90 , 0);
            setTimeout(function(){              
                pCard.removeClass('flip190').addClass('flip180').find('div.shadow').hide();                        
                setTimeout(function(){
                    pCard.css('transition', '100ms ease-out');        
                    pCard.find('.cx, .cy').addClass('s1');
                    setTimeout(function(){pCard.find('.cx, .cy').addClass('s2');}, 100);
                    setTimeout(function(){pCard.find('.cx, .cy').addClass('s3');}, 200);             
                    pCard.find('div.carouselNext, div.carouselPrev').addClass('visible');                
                }, 100);
            }, 100);            
        }, 150);            
    });         
    
    // Flip card back to the front side (Scoped)
    $('.flip-back').click(function(){       
        var pCard = $(this).closest('.product-card');
        
        pCard.removeClass('flip180').addClass('flip190');
        setTimeout(function(){
            pCard.removeClass('flip190').addClass('flip90');
    
            pCard.find('.product-back div.shadow').css('opacity', 0).fadeTo( 100 , 1, function(){
                pCard.find('.product-back, .product-back div.shadow').hide();
                pCard.find('.product-front, .product-front div.shadow').show();
            });
        }, 50);
        
        setTimeout(function(){
            pCard.removeClass('flip90').addClass('flip-10');
            pCard.find('.product-front div.shadow').show().fadeTo( 100 , 0);
            setTimeout(function(){                      
                pCard.find('.product-front div.shadow').hide();
                pCard.removeClass('flip-10').css('transition', '100ms ease-out');       
                pCard.find('.cx, .cy').removeClass('s1 s2 s3');           
            }, 100);            
        }, 150);            
    }); 

    /* ----  Image Gallery Carousel (Scoped) ---- */
    $('.carousel').each(function(){
        var $carouselContainer = $(this);
        var carouselList = $carouselContainer.find('ul');
        var carouselSlideWidth = 335;
        var carouselWidth = 0;  
        var isAnimating = false;
        
        // building the width of the casousel
        $carouselContainer.find('li').each(function(){
            carouselWidth += carouselSlideWidth;
        });
        carouselList.css('width', carouselWidth);
        
        // Load Next Image
        $carouselContainer.find('div.carouselNext').on('click', function(){
            var currentLeft = Math.abs(parseInt(carouselList.css("left"))) || 0;
            var newLeft = currentLeft + carouselSlideWidth;
            if(newLeft >= carouselWidth || isAnimating === true){return;}
            carouselList.css({'left': "-" + newLeft + "px", "transition": "300ms ease-out"});
            isAnimating = true;
            setTimeout(function(){isAnimating = false;}, 300);          
        });
        
        // Load Previous Image
        $carouselContainer.find('div.carouselPrev').on('click', function(){
            var currentLeft = Math.abs(parseInt(carouselList.css("left"))) || 0;
            var newLeft = currentLeft - carouselSlideWidth;
            if(newLeft < 0  || isAnimating === true){return;}
            carouselList.css({'left': "-" + newLeft + "px", "transition": "300ms ease-out"});
            isAnimating = true;
            setTimeout(function(){isAnimating = false;}, 300);          
        });
    });

});
</script>
